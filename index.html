<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightX Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">

        <!-- Sidebar -->
        <div class="col-lg-2 sidebar p-0">

            <div class="logo-section p-4">
                <h3>InsightX</h3>
            </div>

            <ul class="nav flex-column">

                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        <i class="bi bi-grid"></i> Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-bar-chart"></i> Analytics
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-people"></i> Team
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-gear"></i> Settings
                    </a>
                </li>

            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-lg-10 main-content">

            <!-- Navbar -->
            <div class="top-navbar d-flex justify-content-between align-items-center p-3">

                <h4>Dashboard Overview</h4>

                <div class="profile-section d-flex align-items-center gap-3">

                    <i class="bi bi-bell notification-icon"></i>

                    <img src="https://i.pravatar.cc/40"
                         class="rounded-circle"
                         alt="profile">

                </div>

            </div>

            <div class="container-fluid p-4">

    <div class="row g-4">

        <!-- Card 1 -->
        <div class="col-md-6 col-xl-3">
            <div class="stats-card revenue-card">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <p class="card-title-text">Revenue</p>
                        <h3>$24,500</h3>
                        <span class="growth positive">
                            +12.5%
                        </span>
                    </div>

                    <div class="card-icon">
                        <i class="bi bi-currency-dollar"></i>
                    </div>

                </div>

            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-6 col-xl-3">
            <div class="stats-card users-card">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <p class="card-title-text">Users</p>
                        <h3>8,420</h3>
                        <span class="growth positive">
                            +8.2%
                        </span>
                    </div>

                    <div class="card-icon">
                        <i class="bi bi-people-fill"></i>
                    </div>

                </div>

            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-6 col-xl-3">
            <div class="stats-card orders-card">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <p class="card-title-text">Orders</p>
                        <h3>1,245</h3>
                        <span class="growth negative">
                            -2.4%
                        </span>
                    </div>

                    <div class="card-icon">
                        <i class="bi bi-bag-check-fill"></i>
                    </div>

                </div>

            </div>
        </div>

        <!-- Card 4 -->
        <div class="col-md-6 col-xl-3">
            <div class="stats-card conversion-card">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <p class="card-title-text">Conversion</p>
                        <h3>68%</h3>
                        <span class="growth positive">
                            +5.7%
                        </span>
                    </div>

                    <div class="card-icon">
                        <i class="bi bi-graph-up-arrow"></i>
                    </div>

                </div>

            </div>
        </div>

    </div>

</div>
        </div>
    </div>
</div>



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="js/script.js"></script>

</body>
</html>
