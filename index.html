<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightX Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container-fluid p-0">
    <div class="d-flex w-100">

        <!-- Sidebar (Offcanvas on Mobile) -->
        <div class="sidebar-wrapper offcanvas-lg offcanvas-start p-0" tabindex="-1" id="sidebarMenu" aria-labelledby="sidebarMenuLabel">
            
            <div class="offcanvas-header d-lg-none border-bottom border-secondary">
                <h5 class="offcanvas-title text-white fw-bold" id="sidebarMenuLabel">InsightX</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
            </div>
            
            <div class="offcanvas-body d-flex flex-column p-0">
                <div class="logo-section p-4 d-none d-lg-block">
                <h3>InsightX</h3>
            </div>

            <ul class="nav flex-column">

                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        <i class="bi bi-grid"></i> Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-bar-chart"></i> Analytics
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-people"></i> Team
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-gear"></i> Settings
                    </a>
                </li>

            </ul>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content w-100">

            <!-- Navbar -->
            <div class="top-navbar d-flex justify-content-between align-items-center p-3 px-4">

                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-light d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                        <i class="bi bi-list fs-5"></i>
                    </button>
                    <h4>Dashboard Overview</h4>
                </div>

                <div class="profile-section d-flex align-items-center gap-3">

                    <i class="bi bi-bell notification-icon"></i>

                    <img src="https://i.pravatar.cc/40"
                         class="rounded-circle"
                         alt="profile">

                </div>

            </div>

            <div class="container-fluid px-4 py-4 px-lg-5 py-lg-5">

    <div class="row g-4">

        <!-- Card 1 -->
        <div class="col-md-6 col-xl-3">
            <div class="stats-card revenue-card">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <p class="card-title-text">Revenue</p>
                        <h3>$24,500</h3>
                        <span class="growth positive">
                            +12.5%
                        </span>
                    </div>

                    <div class="card-icon">
                        <i class="bi bi-currency-dollar"></i>
                    </div>

                </div>

            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-6 col-xl-3">
            <div class="stats-card users-card">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <p class="card-title-text">Users</p>
                        <h3>8,420</h3>
                        <span class="growth positive">
                            +8.2%
                        </span>
                    </div>

                    <div class="card-icon">
                        <i class="bi bi-people-fill"></i>
                    </div>

                </div>

            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-6 col-xl-3">
            <div class="stats-card orders-card">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <p class="card-title-text">Orders</p>
                        <h3>1,245</h3>
                        <span class="growth negative">
                            -2.4%
                        </span>
                    </div>

                    <div class="card-icon">
                        <i class="bi bi-bag-check-fill"></i>
                    </div>

                </div>

            </div>
        </div>

        <!-- Card 4 -->
        <div class="col-md-6 col-xl-3">
            <div class="stats-card conversion-card">

                <div class="d-flex justify-content-between align-items-center">

                    <div>
                        <p class="card-title-text">Conversion</p>
                        <h3>68%</h3>
                        <span class="growth positive">
                            +5.7%
                        </span>
                    </div>

                    <div class="card-icon">
                        <i class="bi bi-graph-up-arrow"></i>
                    </div>

                </div>

            </div>
        </div>

    </div>

    <!-- Analytics Section -->
    <div class="row g-4 mt-1">
        
        <!-- Revenue Chart -->
        <div class="col-xl-8 col-lg-7">
            <div class="stats-card dashboard-chart-card">
                <h5 class="card-title-text mb-4">Revenue Overview</h5>
                <div class="chart-container w-100">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Traffic Sources -->
        <div class="col-xl-4 col-lg-5">
            <div class="stats-card traffic-card">
                <h5 class="card-title-text mb-4">Traffic Sources</h5>
                
                <div class="traffic-item">
                    <div class="traffic-header">
                        <span>Direct</span>
                        <span>45%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill bg-direct" style="width: 45%"></div>
                    </div>
                </div>

                <div class="traffic-item">
                    <div class="traffic-header">
                        <span>Social</span>
                        <span>25%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill bg-social" style="width: 25%"></div>
                    </div>
                </div>

                <div class="traffic-item">
                    <div class="traffic-header">
                        <span>Organic</span>
                        <span>20%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill bg-organic" style="width: 20%"></div>
                    </div>
                </div>

                <div class="traffic-item">
                    <div class="traffic-header">
                        <span>Referral</span>
                        <span>10%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill bg-referral" style="width: 10%"></div>
                    </div>
                </div>
                
            </div>
        </div>

    </div>

</div>
        </div>
    </div>
</div>



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom JS -->
    <script src="js/script.js"></script>

</body>
</html>
