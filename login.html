<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightX - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--sidebar-bg) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        /* Animated Background Elements */
        .glow-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }
        .glow-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: rgba(99, 102, 241, 0.4); }
        .glow-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: rgba(16, 185, 129, 0.3); animation-delay: 2s; }
        
        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .auth-card {
            background: var(--navbar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-highlight);
            box-shadow: var(--shadow-md);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            z-index: 1;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.6s ease forwards;
        }

        @keyframes slideUpFade {
            to { transform: translateY(0); opacity: 1; }
        }

        .auth-card .form-control {
            background-color: var(--bg-color);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .auth-card .form-control:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            border-color: #6366f1;
            background-color: var(--card-bg);
        }
        .auth-card .form-label {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }
        .btn-auth {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(99, 102, 241, 0.3);
            color: white;
        }
        .btn-social {
            background-color: var(--bg-color);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-social:hover {
            background-color: var(--card-border);
        }
    </style>
</head>
<body>

    <!-- Decorative Elements -->
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <div class="auth-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-main mb-1">InsightX</h3>
            <p class="text-muted">Welcome back. Please enter your details.</p>
        </div>

        <form action="index.html">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="name@company.com" required>
            </div>
            
            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label mb-0">Password</label>
                    <a href="#" class="text-decoration-none small" style="color: #6366f1;">Forgot password?</a>
                </div>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label text-muted small" for="remember">Remember me for 30 days</label>
            </div>

            <button type="submit" class="btn btn-auth w-100 mb-3">Sign in</button>
            
            <div class="position-relative text-center my-4">
                <hr class="text-muted opacity-25">
                <span class="position-absolute top-50 start-50 translate-middle px-3 small text-muted" style="background: var(--card-bg);">Or continue with</span>
            </div>
            
            <div class="d-grid gap-2">
                <button type="button" class="btn btn-social w-100 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-google text-danger"></i> Google
                </button>
                <button type="button" class="btn btn-social w-100 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-github"></i> GitHub
                </button>
            </div>
            
            <div class="text-center mt-4 pt-2">
                <p class="text-muted small">Don't have an account? <a href="#" class="text-decoration-none fw-semibold" style="color: #6366f1;">Sign up</a></p>
            </div>
        </form>
    </div>

    <!-- Script to initialize correct theme -->
    <script>
        const storedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', storedTheme);
    </script>
</body>
</html>
